<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serie cosh(x)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#f4f4f4;color:#111;padding:24px 16px;}
h1{font-size:22px;margin-bottom:6px;}
.formula{font-size:14px;color:#666;margin-bottom:24px;}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;border:1px solid rgba(0,0,0,0.1);}
label{display:block;font-size:13px;color:#666;margin-bottom:6px;font-weight:500;}
input[type=number]{width:100%;padding:12px;border:1.5px solid rgba(0,0,0,0.2);border-radius:10px;font-size:18px;font-weight:700;outline:none;font-family:inherit;}
input[type=range]{width:100%;margin-top:8px;}
.range-val{font-size:13px;color:#666;text-align:right;margin-top:4px;}
button{width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
button:active{opacity:0.8;}
.result-box{background:#f0f8ff;border-radius:12px;padding:16px;margin-top:12px;}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.07);}
.result-row:last-child{border-bottom:none;}
.result-row .rlbl{font-size:14px;color:#444;}
.result-row .rval{font-size:15px;font-weight:700;}
.rval.good{color:#1a6fc4;}
.terms-list{margin-top:16px;}
.term-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.05);color:#555;}
.term-row:last-child{border-bottom:none;}
.term-idx{color:#aaa;width:28px;}
.term-expr{flex:1;font-family:monospace;}
.term-val{font-weight:600;color:#111;}
h2{font-size:15px;font-weight:700;margin-bottom:10px;}
</style>
</head>
<body>
<h1>Serie cosh(x)</h1>
<p class="formula">cosh(x) = 1 + x²/2! + x⁴/4! + x⁶/6! + x⁸/8! + ···</p>

<div class="card">
  <label>Valor de x</label>
  <input type="number" id="xval" value="1" step="0.1">

  <label style="margin-top:16px;">Número de términos: <span id="nlbl">6</span></label>
  <input type="range" id="nterms" min="1" max="20" value="6" oninput="document.getElementById('nlbl').textContent=this.value">

  <button onclick="calcular()">Calcular</button>

  <div class="result-box" id="results" style="display:none">
    <div class="result-row">
      <span class="rlbl">Aproximación (serie)</span>
      <span class="rval good" id="r-aprox"></span>
    </div>
    <div class="result-row">
      <span class="rlbl">Valor exacto Math.cosh(x)</span>
      <span class="rval" id="r-exact"></span>
    </div>
    <div class="result-row">
      <span class="rlbl">Error absoluto</span>
      <span class="rval" id="r-error"></span>
    </div>
  </div>
</div>

<div class="card" id="terms-card" style="display:none">
  <h2>Términos de la serie</h2>
  <div class="terms-list" id="terms-list"></div>
</div>

<script>
function factorial(n) {
  let result = 1;
  for (let i = 2; i <= n; i++) result *= i;
  return result;
}

function coshSerie(x, n) {
  let suma = 0;
  const terminos = [];

  for (let k = 0; k < n; k++) {
    const exp = 2 * k;
    const fact = factorial(exp);
    const termino = Math.pow(x, exp) / fact;
    suma += termino;
    terminos.push({ k, exp, fact, termino, parcial: suma });
  }

  return { suma, terminos };
}

function calcular() {
  const x = parseFloat(document.getElementById('xval').value);
  const n = parseInt(document.getElementById('nterms').value);

  if (isNaN(x)) return;

  const { suma, terminos } = coshSerie(x, n);
  const exacto = Math.cosh(x);
  const error = Math.abs(exacto - suma);

  document.getElementById('r-aprox').textContent = suma.toFixed(10);
  document.getElementById('r-exact').textContent = exacto.toFixed(10);
  document.getElementById('r-error').textContent = error.toExponential(4);
  document.getElementById('results').style.display = 'block';

  const lista = document.getElementById('terms-list');
  lista.innerHTML = terminos.map(t => {
    const expr = t.exp === 0
      ? 'x⁰/0! = 1'
      : `x${sup(t.exp)}/${t.exp}! `;
    return `<div class="term-row">
      <span class="term-idx">k=${t.k}</span>
      <span class="term-expr">${expr}</span>
      <span class="term-val">+${t.termino.toExponential(4)}</span>
    </div>`;
  }).join('');

  document.getElementById('terms-card').style.display = 'block';
}

function sup(n) {
  const map = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
  return String(n).split('').map(c => map[c] || c).join('');
}

calcular();
</script>
</body>
</html>
