
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.screen { display: none; }
.screen.active { display: block; }
.header { padding: 16px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 10px; }
.header h1 { font-size: 17px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
.btn-back { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 20px; padding: 0; }
.month-selector { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--color-background-secondary); }
.month-label { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.btn-month { background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); }
.summary-cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; padding: 14px 16px; }
.summary-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; }
.summary-card .label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.summary-card .value { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.summary-card .value.danger { color: var(--color-text-danger); }
.section-title { font-size: 13px; color: var(--color-text-secondary); padding: 0 16px 8px; text-transform: none; letter-spacing: 0; }
.expense-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.expense-item { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.cat-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.expense-info { flex: 1; min-width: 0; }
.expense-desc { font-size: 14px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.expense-meta { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.expense-amount { font-size: 15px; font-weight: 500; color: var(--color-text-danger); white-space: nowrap; }
.fab { position: fixed; bottom: 28px; right: 20px; width: 54px; height: 54px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 26px; color: var(--color-text-primary); box-shadow: none; z-index: 10; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--color-text-secondary); font-size: 14px; }
.empty-state i { font-size: 40px; display: block; margin-bottom: 12px; color: var(--color-text-tertiary); }
.form-group { padding: 0 16px; margin-bottom: 18px; }
.form-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; background: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-sans); }
.form-input:focus { outline: none; border-color: var(--color-border-primary); }
.amount-input { font-size: 22px; font-weight: 500; text-align: center; }
.cat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; padding: 0 16px; margin-bottom: 18px; }
.cat-option { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; background: var(--color-background-primary); color: var(--color-text-primary); }
.cat-option.selected { border-color: var(--color-border-info); background: var(--color-background-info); color: var(--color-text-info); }
.cat-add { border-style: dashed; color: var(--color-text-secondary); }
.btn-primary { width: calc(100% - 32px); margin: 0 16px; padding: 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); font-size: 16px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; font-family: var(--font-sans); }
.btn-primary:active { background: var(--color-background-secondary); }
.photo-area { margin: 0 16px 18px; border: 0.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 22px; text-align: center; cursor: pointer; color: var(--color-text-secondary); }
.photo-area i { font-size: 32px; display: block; margin-bottom: 8px; }
.photo-area p { font-size: 13px; }
.photo-preview { margin: 0 16px 18px; border-radius: var(--border-radius-lg); overflow: hidden; position: relative; border: 0.5px solid var(--color-border-tertiary); }
.photo-preview img { width: 100%; display: block; max-height: 180px; object-fit: cover; }
.photo-preview .remove-photo { position: absolute; top: 8px; right: 8px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
.ai-result { margin: 0 16px 18px; background: var(--color-background-info); border: 0.5px solid var(--color-border-info); border-radius: var(--border-radius-md); padding: 12px; font-size: 13px; color: var(--color-text-info); }
.ai-result b { display: block; margin-bottom: 2px; font-weight: 500; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); padding: 10px 18px; border-radius: var(--border-radius-lg); font-size: 14px; color: var(--color-text-primary); opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 20; }
.toast.show { opacity: 1; }
.nav-tabs { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
.nav-tab { flex: 1; padding: 12px 0; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; border: none; background: none; font-family: var(--font-sans); border-bottom: 2px solid transparent; }
.nav-tab.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); font-weight: 500; }
.by-cat { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.cat-row { display: flex; align-items: center; gap: 10px; }
.cat-row-name { font-size: 14px; color: var(--color-text-primary); flex: 1; }
.cat-bar-wrap { flex: 2; height: 6px; background: var(--color-background-secondary); border-radius: 3px; overflow: hidden; }
.cat-bar { height: 100%; background: var(--color-border-secondary); border-radius: 3px; transition: width 0.4s; }
.cat-row-amt { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; min-width: 70px; text-align: right; }
.manage-cats { padding: 16px; }
.cat-manage-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.cat-manage-emoji { font-size: 22px; width: 32px; text-align: center; }
.cat-manage-name { flex: 1; font-size: 14px; color: var(--color-text-primary); }
.btn-delete-cat { background: none; border: none; cursor: pointer; color: var(--color-text-danger); font-size: 18px; padding: 0; }
.add-cat-row { display: flex; gap: 8px; margin-top: 14px; }
.add-cat-row .form-input { flex: 1; margin: 0; }
.emoji-pick { font-size: 22px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; cursor: pointer; }
.btn-add-cat { padding: 8px 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; color: var(--color-text-primary); font-family: var(--font-sans); }
input[type=file] { display: none; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--color-border-secondary); border-top-color: var(--color-text-info); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<h2 class="sr-only">Aplicación de finanzas personales — registro de gastos mensual</h2>

<div id="screen-home" class="screen active">
  <div class="header">
    <h1>Mis gastos</h1>
    <button onclick="showScreen('screen-categories')" style="background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:20px;" aria-label="Categorías"><i class="ti ti-tag" aria-hidden="true"></i></button>
  </div>
  <div class="month-selector">
    <button class="btn-month" onclick="changeMonth(-1)"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
    <span class="month-label" id="month-label"></span>
    <button class="btn-month" onclick="changeMonth(1)"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
  </div>
  <div class="summary-cards">
    <div class="summary-card">
      <div class="label">Total del mes</div>
      <div class="value danger" id="total-month">$0</div>
    </div>
    <div class="summary-card">
      <div class="label">Gastos registrados</div>
      <div class="value" id="count-month">0</div>
    </div>
  </div>
  <div id="home-tabs" style="margin-bottom:8px;">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('lista')" id="tab-lista">Lista</button>
      <button class="nav-tab" onclick="switchTab('categorias')" id="tab-categorias">Por categoría</button>
    </div>
  </div>
  <div id="panel-lista">
    <p class="section-title" id="section-subtitle"></p>
    <div class="expense-list" id="expense-list"></div>
    <div style="height:90px;"></div>
  </div>
  <div id="panel-categorias" style="display:none;">
    <div class="by-cat" id="by-cat-list"></div>
    <div style="height:90px;"></div>
  </div>
  <div class="fab" onclick="showScreen('screen-add')" role="button" aria-label="Agregar gasto"><i class="ti ti-plus" aria-hidden="true"></i></div>
</div>

<div id="screen-add" class="screen">
  <div class="header">
    <button class="btn-back" onclick="showScreen('screen-home')" aria-label="Volver"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <h1>Nuevo gasto</h1>
  </div>
  <div style="padding:16px 0 0;">
    <div class="form-group">
      <label class="form-label">Monto (CLP)</label>
      <input class="form-input amount-input" type="number" id="inp-amount" placeholder="$0" inputmode="numeric" />
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <input class="form-input" type="text" id="inp-desc" placeholder="Ej: Almuerzo" />
    </div>
    <div style="padding:0 16px; margin-bottom:8px;">
      <label class="form-label">Categoría</label>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input class="form-input" type="date" id="inp-date" />
    </div>
    <div style="padding:0 16px; margin-bottom:8px;">
      <label class="form-label" style="display:flex;align-items:center;gap:6px;"><i class="ti ti-camera" aria-hidden="true"></i> Foto de boleta <span style="font-size:11px;color:var(--color-text-tertiary);">(requiere conexión)</span></label>
    </div>
    <div id="photo-container">
      <div class="photo-area" onclick="document.getElementById('file-input').click()">
        <i class="ti ti-receipt" aria-hidden="true"></i>
        <p>Toca para fotografiar o subir boleta</p>
        <p style="font-size:11px;margin-top:4px;color:var(--color-text-tertiary);">La IA detectará el monto automáticamente</p>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="handlePhoto(event)" />
    <div id="ai-result-box" style="display:none;"></div>
    <div style="height:14px;"></div>
    <button class="btn-primary" onclick="saveExpense()">Guardar gasto</button>
    <div style="height:30px;"></div>
  </div>
</div>

<div id="screen-categories" class="screen">
  <div class="header">
    <button class="btn-back" onclick="showScreen('screen-home')" aria-label="Volver"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <h1>Categorías</h1>
  </div>
  <div class="manage-cats">
    <div id="cat-manage-list"></div>
    <div class="add-cat-row">
      <button class="emoji-pick" id="emoji-btn" onclick="cycleEmoji()">🏷️</button>
      <input class="form-input" type="text" id="inp-new-cat" placeholder="Nueva categoría" />
      <button class="btn-add-cat" onclick="addCategory()">Agregar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJIS = ['🍕','🚌','🛒','💊','🎮','📚','☕','🏋️','🎵','💡','🏠','✈️','👕','💈','🐾','🎁','🍺','⚽'];
let emojiIdx = 0;

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let state = JSON.parse(localStorage.getItem('finanzas_state') || 'null') || {
  categories: [
    {id:'c1', name:'Comida', emoji:'🍕'},
    {id:'c2', name:'Transporte', emoji:'🚌'},
    {id:'c3', name:'Compras', emoji:'🛒'},
    {id:'c4', name:'Salud', emoji:'💊'},
    {id:'c5', name:'Gym', emoji:'🏋️'},
    {id:'c6', name:'Otro', emoji:'📌'},
  ],
  expenses: [],
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear(),
};

function save() { localStorage.setItem('finanzas_state', JSON.stringify(state)); }

function fmtCLP(n) {
  return '$' + Math.round(n).toLocaleString('es-CL');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-home') renderHome();
  if (id === 'screen-add') renderAddForm();
  if (id === 'screen-categories') renderCategories();
}

function changeMonth(dir) {
  state.currentMonth += dir;
  if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
  if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
  save();
  renderHome();
}

function switchTab(tab) {
  document.getElementById('panel-lista').style.display = tab === 'lista' ? '' : 'none';
  document.getElementById('panel-categorias').style.display = tab === 'categorias' ? '' : 'none';
  document.getElementById('tab-lista').classList.toggle('active', tab === 'lista');
  document.getElementById('tab-categorias').classList.toggle('active', tab === 'categorias');
  if (tab === 'categorias') renderByCat();
}

function monthExpenses() {
  return state.expenses.filter(e => {
    const d = new Date(e.date + 'T12:00:00');
    return d.getMonth() === state.currentMonth && d.getFullYear() === state.currentYear;
  }).sort((a,b) => new Date(b.date) - new Date(a.date));
}

function renderHome() {
  document.getElementById('month-label').textContent = MONTHS[state.currentMonth] + ' ' + state.currentYear;
  const exps = monthExpenses();
  const total = exps.reduce((s,e) => s + e.amount, 0);
  document.getElementById('total-month').textContent = fmtCLP(total);
  document.getElementById('count-month').textContent = exps.length;
  document.getElementById('section-subtitle').textContent = exps.length ? exps.length + ' movimiento' + (exps.length !== 1 ? 's' : '') : '';
  const list = document.getElementById('expense-list');
  if (!exps.length) {
    list.innerHTML = '<div class="empty-state"><i class="ti ti-receipt-off" aria-hidden="true"></i>Sin gastos este mes.<br>Toca + para agregar uno.</div>';
    return;
  }
  list.innerHTML = exps.map(e => {
    const cat = state.categories.find(c => c.id === e.catId) || {name:'Otro', emoji:'📌'};
    const d = new Date(e.date + 'T12:00:00');
    const dayStr = d.getDate() + ' ' + MONTHS[d.getMonth()].slice(0,3);
    return `<div class="expense-item" onclick="deleteExpense('${e.id}')">
      <div class="cat-icon" style="background:var(--color-background-secondary);">${cat.emoji}</div>
      <div class="expense-info">
        <div class="expense-desc">${e.desc || cat.name}</div>
        <div class="expense-meta">${cat.name} · ${dayStr}</div>
      </div>
      <div class="expense-amount">${fmtCLP(e.amount)}</div>
    </div>`;
  }).join('');
}

function renderByCat() {
  const exps = monthExpenses();
  const total = exps.reduce((s,e) => s + e.amount, 0) || 1;
  const map = {};
  exps.forEach(e => { map[e.catId] = (map[e.catId]||0) + e.amount; });
  const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]);
  if (!sorted.length) {
    document.getElementById('by-cat-list').innerHTML = '<div class="empty-state"><i class="ti ti-chart-pie" aria-hidden="true"></i>Sin datos este mes.</div>';
    return;
  }
  document.getElementById('by-cat-list').innerHTML = sorted.map(([cid, amt]) => {
    const cat = state.categories.find(c => c.id === cid) || {name:'Otro', emoji:'📌'};
    const pct = Math.round(amt / total * 100);
    return `<div class="cat-row">
      <span style="font-size:18px;width:28px;text-align:center;">${cat.emoji}</span>
      <span class="cat-row-name">${cat.name}</span>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;"></div></div>
      <span class="cat-row-amt">${fmtCLP(amt)}</span>
    </div>`;
  }).join('');
}

let selectedCatId = null;
function renderAddForm() {
  selectedCatId = null;
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('ai-result-box').style.display = 'none';
  document.getElementById('ai-result-box').innerHTML = '';
  resetPhotoUI();
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = state.categories.map(c =>
    `<button class="cat-option" id="cat-opt-${c.id}" onclick="selectCat('${c.id}')">${c.emoji} ${c.name}</button>`
  ).join('');
}

function selectCat(id) {
  selectedCatId = id;
  document.querySelectorAll('.cat-option').forEach(b => b.classList.remove('selected'));
  const el = document.getElementById('cat-opt-' + id);
  if (el) el.classList.add('selected');
}

function saveExpense() {
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const desc = document.getElementById('inp-desc').value.trim();
  const date = document.getElementById('inp-date').value;
  if (!amount || amount <= 0) { showToast('Ingresa un monto válido'); return; }
  if (!selectedCatId) { showToast('Selecciona una categoría'); return; }
  if (!date) { showToast('Selecciona una fecha'); return; }
  state.expenses.push({ id: 'e' + Date.now(), amount, desc, catId: selectedCatId, date });
  save();
  showToast('Gasto guardado ✓');
  showScreen('screen-home');
}

function deleteExpense(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  state.expenses = state.expenses.filter(e => e.id !== id);
  save();
  renderHome();
}

function renderCategories() {
  const el = document.getElementById('cat-manage-list');
  el.innerHTML = state.categories.map(c =>
    `<div class="cat-manage-item">
      <span class="cat-manage-emoji">${c.emoji}</span>
      <span class="cat-manage-name">${c.name}</span>
      <button class="btn-delete-cat" onclick="deleteCat('${c.id}')" aria-label="Eliminar ${c.name}"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`
  ).join('');
}

function deleteCat(id) {
  const inUse = state.expenses.some(e => e.catId === id);
  if (inUse) { showToast('Categoría en uso, no se puede eliminar'); return; }
  state.categories = state.categories.filter(c => c.id !== id);
  save();
  renderCategories();
  showToast('Categoría eliminada');
}

function cycleEmoji() {
  emojiIdx = (emojiIdx + 1) % EMOJIS.length;
  document.getElementById('emoji-btn').textContent = EMOJIS[emojiIdx];
}

function addCategory() {
  const name = document.getElementById('inp-new-cat').value.trim();
  if (!name) { showToast('Escribe un nombre'); return; }
  const emoji = document.getElementById('emoji-btn').textContent;
  state.categories.push({ id: 'c' + Date.now(), name, emoji });
  save();
  document.getElementById('inp-new-cat').value = '';
  renderCategories();
  showToast('Categoría agregada ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

let photoBase64 = null;
function resetPhotoUI() {
  photoBase64 = null;
  document.getElementById('photo-container').innerHTML = `
    <div class="photo-area" onclick="document.getElementById('file-input').click()">
      <i class="ti ti-receipt" aria-hidden="true"></i>
      <p>Toca para fotografiar o subir boleta</p>
      <p style="font-size:11px;margin-top:4px;color:var(--color-text-tertiary);">La IA detectará el monto automáticamente</p>
    </div>`;
}

function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    photoBase64 = base64;
    const mediaType = file.type;
    document.getElementById('photo-container').innerHTML = `
      <div class="photo-preview">
        <img src="${e.target.result}" alt="Boleta" />
        <button class="remove-photo" onclick="resetPhotoUI()" aria-label="Quitar foto"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>`;
    const box = document.getElementById('ai-result-box');
    box.style.display = 'block';
    box.innerHTML = `<div class="ai-result"><span class="spinner"></span> Analizando boleta...</div>`;
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 200,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
              { type: 'text', text: 'Esta es una boleta o recibo. Extrae SOLO el monto TOTAL a pagar en pesos chilenos (CLP). Responde SOLO con el número entero sin puntos ni símbolo, por ejemplo: 4990. Si no puedes determinarlo, responde: NO.' }
            ]
          }]
        })
      });
      const data = await resp.json();
      const text = (data.content || []).map(b => b.text || '').join('').trim();
      const num = parseInt(text.replace(/\D/g,''));
      if (!isNaN(num) && num > 0) {
        document.getElementById('inp-amount').value = num;
        box.innerHTML = `<div class="ai-result"><b>✓ Monto detectado</b>Se llenó automáticamente: ${fmtCLP(num)}</div>`;
      } else {
        box.innerHTML = `<div class="ai-result" style="background:var(--color-background-warning);border-color:var(--color-border-warning);color:var(--color-text-warning);"><b>No se pudo detectar el monto</b>Ingrésalo manualmente.</div>`;
      }
    } catch(err) {
      box.innerHTML = `<div class="ai-result" style="background:var(--color-background-warning);border-color:var(--color-border-warning);color:var(--color-text-warning);">Sin conexión — ingresa el monto manualmente.</div>`;
    }
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

renderHome();
</script>
